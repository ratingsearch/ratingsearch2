<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="卓球レイティング検索">
<meta property="og:description" content="会員番号でレイティング推移を確認できます。">
<meta property="og:type" content="website">

<title>レイティング検索</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #f4f6f9;
  --card: #ffffff;
  --border: #e2e6ed;
  --text: #1a1e2e;
  --text2: #6b7280;
  --accent: #1a56db;
  --accent2: #e02424;
  --up: #0e9f6e;
  --down: #e02424;
  --hdr: #111827;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header { background: var(--hdr); padding: 20px 24px; display: flex; align-items: center; gap: 12px; }
.logo { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.header-text h1 { font-size: 16px; font-weight: 700; color: white; letter-spacing: .04em; }
.header-text p { font-size: 11px; color: #9ca3af; margin-top: 2px; }

.container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

.search-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;

  display: flex;
  flex-direction: column;
}
.search-card h2 { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 16px; }

.search-row { display: flex; gap: 10px; }
.search-row input { flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; font-family: 'DM Mono', monospace; color: var(--text); background: white; outline: none; transition: border-color .2s; }
.search-row input:focus { border-color: var(--accent); }
.search-row input::placeholder { color: #c0c8d8; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; }

.type-row { display: flex; gap: 8px; margin-top: 12px; align-items: center; }

.type-btn {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: white;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text2);
  transition: all .15s;
}
.type-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

.btn-search {
  padding: 12px 24px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  white-space: nowrap;
  transition: background .15s, opacity .15s;
}
.btn-search:hover { background: #1648c8; }
.btn-search:active { transform: scale(.98); }
.btn-search:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ★ 比較ボタン（コンパクト） */
.btn-compare-mini {
  padding: 8px 14px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text2);
  white-space: nowrap;
  transition: background .15s;
  margin-left: auto;
}
.btn-compare-mini:hover { background: var(--bg); }
.btn-compare-mini:active { transform: scale(.98); }

.compare-area {
  display: none;
  margin-top: 10px;
  gap: 8px;
  align-items: center;
}
.compare-area.show {
  display: flex;
}

.compare-area input {
  flex: 1;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 16px;
  font-family: 'DM Mono', monospace;
  outline: none;
  background: white;
}
.compare-area input:focus { border-color: var(--accent2); }

.btn-compare-run {
  padding: 12px 18px;
  background: var(--accent2);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  white-space: nowrap;
}
.btn-compare-run:hover { opacity: 0.9; }
.btn-compare-run:active { transform: scale(.98); }
.btn-compare-run:disabled { opacity: 0.5; cursor: not-allowed; }

.loading { text-align: center; padding: 48px; color: var(--text2); font-size: 14px; display: none; }

.pingpong {
  font-size: 48px;
  margin: 0 auto 16px;
  width: fit-content;
  animation: bounce .8s infinite alternate ease-in-out;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-18px); }
}

.result { display: none; }

/* ★ 会員番号＋前回比（独立枠） */
.top-stats {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.top-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
}

.top-lbl {
  font-size: 11px;
  color: var(--text2);
  font-weight: 500;
  margin-bottom: 6px;
}

.top-val {
  font-size: 18px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  color: var(--text);
}

.top-meta {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
  font-family: 'Noto Sans JP', sans-serif;
}

.top-val.up { color: var(--up); }
.top-val.dn { color: var(--down); }
.top-val.dz { color: var(--text2); }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px; text-align: center; }
.stat .lbl { font-size: 11px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
.stat .val { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; }
.card-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }

.range-btns { display: flex; gap: 6px; margin-bottom: 14px; }
.range-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; color: var(--text2); transition: all .15s; }
.range-btn.active { background: var(--hdr); border-color: var(--hdr); color: white; }
.range-btn:hover:not(.active) { background: var(--bg); }

.slider-area { margin-bottom: 14px; }
.slider-labels { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; gap: 8px; }
.slider-labels span { background: #eff4ff; color: var(--accent); padding: 3px 10px; border-radius: 6px; font-weight: 500; font-family: 'DM Mono', monospace; white-space: nowrap; }

.dual-slider-wrap { position: relative; height: 36px; display: flex; align-items: center; }
.slider-track { position: absolute; left: 0; right: 0; height: 4px; background: var(--border); border-radius: 2px; }
.slider-fill { position: absolute; height: 4px; background: var(--accent); border-radius: 2px; }
.dual-slider-wrap input[type=range] { position: absolute; width: 100%; height: 4px; appearance: none; -webkit-appearance: none; background: transparent; pointer-events: none; outline: none; }
.dual-slider-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: white; border: 2.5px solid var(--accent); cursor: pointer; pointer-events: all; box-shadow: 0 1px 4px rgba(0,0,0,.15); }
.dual-slider-wrap input[type=range]::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: white; border: 2.5px solid var(--accent); cursor: pointer; pointer-events: all; box-shadow: 0 1px 4px rgba(0,0,0,.15); }

.nav-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.nav-btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: 8px; background: white; font-size: 13px; cursor: pointer; color: var(--text2); font-family: 'Noto Sans JP', sans-serif; transition: all .15s; }
.nav-btn:hover { background: var(--bg); }
.nav-btn:active { transform: scale(.97); }
.nav-center { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }

.chart-wrap { position: relative; width: 100%; height: 260px; margin-top: 16px; }

.filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; color: var(--text2); transition: all .15s; }
.filter-btn.active { background: var(--hdr); border-color: var(--hdr); color: white; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 8px 12px; text-align: left; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); background: #f8fafc; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; font-family: 'DM Mono', monospace; font-size: 13px; }
td.name-col { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; }
tr:last-child td { border-bottom: none; }

.not-found, .error-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 24px;
  text-align: center;
  color: var(--text2);
  font-size: 14px;
  display: none;
}

.empty { text-align: center; padding: 48px 20px; color: var(--text2); font-size: 14px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.ox { overflow-x: auto; }

  @media (max-width: 480px) {
  .stats { gap: 8px; }
  .stat .val { font-size: 18px; }

  .search-row { flex-wrap: wrap; }

  /* 比較入力は横並び */
  .compare-area {
    flex-direction: row;
  }

  /* 硬式・ラージ・比較する は横並び */
  .type-row {
    flex-wrap: nowrap;
  }

  /* 比較するボタン右寄せ */
  .btn-compare-mini {
    margin-left: auto;
  }

  .btn-compare-run {
    width: auto;
  }
}

  /* 比較入力欄は横並び（1列）にする */
  .compare-area {
    flex-direction: row;
  }

  .btn-compare-run {
    width: auto;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">🏓</div>
  <div class="header-text">
    <h1>レイティング検索</h1>
    <p>卓球レイティングポイント推移確認</p>
  </div>
</header>

<div class="container">
  <div class="search-card">
  <h2>会員番号で検索</h2>

  <!-- 2段目：会員番号 + 検索 -->
  <div class="search-row">
    <input type="text" id="search-input" placeholder="会員番号を入力（例: 10000001）" inputmode="numeric">
    <button class="btn-search" id="btn-search" onclick="doSearch()">検索</button>
  </div>

  <!-- 3段目：比較する会員番号 + 開始 -->
  <div class="compare-area" id="compare-area">
    <input type="text" id="compare-input" placeholder="比較する会員番号" inputmode="numeric">
    <button class="btn-compare-run" id="btn-compare" onclick="doCompare()">開始</button>
  </div>

  <!-- 4段目：硬式・ラージ・比較する -->
  <div class="type-row">
    <button class="type-btn active" onclick="setType('takkyu', this)">硬式</button>
    <button class="type-btn" onclick="setType('large', this)">ラージ</button>
    <button class="btn-compare-mini" id="btn-toggle-compare" onclick="toggleCompareInput()">比較する</button>
  </div>
</div>

  <div class="loading" id="loading">
    <div class="pingpong">🏓</div>
    データを取得中...
  </div>

  <div class="not-found" id="not-found">
    <div class="empty-icon">😔</div>
    該当するデータが見つかりませんでした
  </div>

  <div class="error-box" id="error-box">
    <div class="empty-icon">⚠️</div>
    通信エラーが発生しました<br>
    時間をおいて再度お試しください
  </div>

  <div class="result" id="result">

    <div class="top-stats">
      <div class="top-box" id="profile-card">
        <div class="top-lbl">会員番号</div>
        <div class="top-val" id="player-id">—</div>
        <div class="top-meta" id="player-meta"></div>
      </div>

      <div class="top-box">
        <div class="top-lbl">前回比</div>
        <div class="top-val" id="stat-diff">—</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="lbl">現在のポイント</div><div class="val" id="stat-cur">—</div></div>
      <div class="stat"><div class="lbl">最高ポイント</div><div class="val" id="stat-best">—</div></div>
      <div class="stat"><div class="lbl">最低ポイント</div><div class="val" id="stat-worst">—</div></div>
    </div>

    <div class="card">
      <div class="card-title">ポイント推移</div>

      <div class="range-btns">
        <button class="range-btn active" id="btn-all" onclick="setPreset(0, this)">全期間</button>
        <button class="range-btn" onclick="setPreset(12, this)">1年</button>
        <button class="range-btn" onclick="setPreset(6, this)">半年</button>
      </div>

      <div class="slider-area">
        <div class="slider-labels">
          <span id="label-start">—</span>
          <span id="label-end">—</span>
        </div>
        <div class="dual-slider-wrap">
          <div class="slider-track"></div>
          <div class="slider-fill" id="slider-fill"></div>
          <input type="range" id="slider-start" min="0" max="100" value="0">
          <input type="range" id="slider-end" min="0" max="100" value="100">
        </div>
        <div class="nav-btns">
          <button class="nav-btn" onclick="shiftRange(-1)">◀ 前へ</button>
          <div class="nav-center" id="nav-count"></div>
          <button class="nav-btn" onclick="shiftRange(1)">次へ ▶</button>
        </div>
      </div>

      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">大会別一覧（<span id="table-title-id">—</span>）</div>
      <div class="filter-row" id="filter-row"></div>
      <div class="ox">
        <table>
          <thead><tr><th>日付</th><th>大会名</th><th>ポイント</th><th>前回比</th></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="empty" id="empty-state">
    <div class="empty-icon">🔍</div>
    会員番号を入力して検索してください
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzrn4cNnURO-x5pUVAT89_smrPQmPe8TzNNpD_4CO4SMj9QD7j9iPobbIggYU08NAhD9A/exec';

let currentType = 'takkyu';

// メイン
let mainId = '';
let allData = [];
let filteredData = [];

// 比較
let compareId = '';
let compareAllData = [];
let compareFilteredData = [];

// 統合X軸（日付一覧）
let mergedLabels = [];

// 点だけのデータ（null除外済み）
let mainPointsSparse = [];
let comparePointsSparse = [];

let chartInstance = null;

let sliderStart = 0;
let sliderEnd = 0;

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleCompareInput() {
  const area = document.getElementById("compare-area");
  area.classList.toggle("show");
}

function hideAll() {
  ['loading','result','not-found','empty-state','error-box'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
}

function setSearchEnabled(enabled) {
  document.getElementById('btn-search').disabled = !enabled;
  document.getElementById('btn-compare').disabled = !enabled;
}

async function fetchData(id) {
  const res = await fetch(`${API_URL}?id=${encodeURIComponent(id)}&type=${currentType}`);
  return await res.json();
}

function mergeDates(mainData, compData) {
  const set = new Set();
  mainData.forEach(d => set.add(d['日付']));
  compData.forEach(d => set.add(d['日付']));
  mergedLabels = Array.from(set).sort();
}

function buildSparseSeries(labels, data) {
  const map = new Map(data.map(d => [d['日付'], d['レイティング']]));
  const points = [];

  labels.forEach((date, idx) => {
    if (map.has(date)) {
      points.push({ x: idx, y: map.get(date) });
    }
  });

  return points;
}

async function doSearch() {
  const id = document.getElementById('search-input').value.trim();
  if (!id) return;

  mainId = id;

  compareId = '';
  compareAllData = [];
  compareFilteredData = [];

  allData = [];
  filteredData = [];

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  setSearchEnabled(false);
  hideAll();
  document.getElementById('loading').style.display = 'block';

  try {
    const data = await fetchData(id);

    hideAll();

    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('not-found').style.display = 'block';
      return;
    }

    allData = data;
    filteredData = data;

    mergeDates(filteredData, []);
    mainPointsSparse = buildSparseSeries(mergedLabels, filteredData);
    comparePointsSparse = [];

    renderResult(id, data);

  } catch(e) {
    hideAll();
    document.getElementById('error-box').style.display = 'block';
  } finally {
    setSearchEnabled(true);
  }
}

async function doCompare() {
  const mainInput = document.getElementById('search-input').value.trim();
  const compInput = document.getElementById('compare-input').value.trim();

  if (!mainInput && !compInput) {
    alert("会員番号を入力してください");
    return;
  }

  setSearchEnabled(false);
  hideAll();
  document.getElementById('loading').style.display = 'block';

  try {
    // ★ メイン側が未入力なら、比較入力をメインとして使う
    if (!mainInput && compInput) {
      mainId = compInput;
      document.getElementById('search-input').value = compInput;

      const data = await fetchData(mainId);

      hideAll();

      if (!Array.isArray(data) || data.length === 0) {
        document.getElementById('not-found').style.display = 'block';
        return;
      }

      allData = data;
      filteredData = data;

      compareId = '';
      compareAllData = [];
      compareFilteredData = [];

      mergeDates(filteredData, []);
      mainPointsSparse = buildSparseSeries(mergedLabels, filteredData);
      comparePointsSparse = [];

      renderResult(mainId, filteredData);
      document.getElementById('result').style.display = 'block';
      return;
    }

    // ★ メイン側が入力されてるなら、それをメインとして使う
    mainId = mainInput;

    const mainData = await fetchData(mainId);

    if (!Array.isArray(mainData) || mainData.length === 0) {
      hideAll();
      document.getElementById('not-found').style.display = 'block';
      return;
    }

    allData = mainData;
    filteredData = mainData;

    // ★ 比較が未入力ならメインだけ表示
    if (!compInput) {
      hideAll();

      compareId = '';
      compareAllData = [];
      compareFilteredData = [];

      mergeDates(filteredData, []);
      mainPointsSparse = buildSparseSeries(mergedLabels, filteredData);
      comparePointsSparse = [];

      renderResult(mainId, filteredData);
      document.getElementById('result').style.display = 'block';
      return;
    }

    // ★ 比較あり（2人表示）
    if (compInput === mainId) {
      hideAll();
      alert("同じ会員番号は比較できません");
      document.getElementById('result').style.display = 'block';
      return;
    }

    // ★ GAS負荷対策：200ms待つ
    await sleep(200);

    const compData = await fetchData(compInput);

    hideAll();

    if (!Array.isArray(compData) || compData.length === 0) {
      alert("比較相手のデータが見つかりませんでした");
      renderResult(mainId, filteredData);
      document.getElementById('result').style.display = 'block';
      return;
    }

    compareId = compInput;
    compareAllData = compData;
    compareFilteredData = compData;

    mergeDates(filteredData, compareFilteredData);

    mainPointsSparse = buildSparseSeries(mergedLabels, filteredData);
    comparePointsSparse = buildSparseSeries(mergedLabels, compareFilteredData);

    initSlider(mergedLabels.length);
    renderChart();

    renderResult(mainId, filteredData);
    document.getElementById('result').style.display = 'block';

  } catch(e) {
    hideAll();
    document.getElementById('error-box').style.display = 'block';
  } finally {
    setSearchEnabled(true);
  }
}

function renderResult(id, data) {
  document.getElementById('table-title-id').textContent = id;

  const cur = data[data.length - 1]['レイティング'];
  const best = Math.max(...data.map(d => d['レイティング']));
  const worst = Math.min(...data.map(d => d['レイティング']));

  const last = data.length >= 2 ? cur - data[data.length - 2]['レイティング'] : null;
  const diffTxt = last === null ? '—' : (last > 0 ? '+' + last : String(last));
  const diffCls = last === null ? '' : (last > 0 ? 'up' : last < 0 ? 'dn' : 'dz');

  document.getElementById('player-id').textContent = id;
  document.getElementById('player-meta').textContent =
    data.length + '大会参加 / ' + (currentType === 'takkyu' ? '硬式' : 'ラージ');

  document.getElementById('stat-cur').textContent = cur.toLocaleString();
  document.getElementById('stat-best').textContent = best.toLocaleString();
  document.getElementById('stat-worst').textContent = worst.toLocaleString();

  const diffEl = document.getElementById('stat-diff');
  diffEl.textContent = diffTxt;
  diffEl.className = 'top-val ' + diffCls;

  const types = ['all', ...new Set(data.map(d => d['種別']))];
  document.getElementById('filter-row').innerHTML = types.map(t =>
    `<button class="filter-btn ${t === 'all' ? 'active' : ''}" onclick="applyFilter('${t}', this)">${t === 'all' ? 'すべて' : t}</button>`
  ).join('');

  initSlider(mergedLabels.length);
  renderChart();
  renderTable(data);

  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-all').classList.add('active');

  document.getElementById('result').style.display = 'block';
  document.getElementById('profile-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function applyFilter(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  filteredData = type === 'all' ? allData : allData.filter(d => d['種別'] === type);

  if (compareAllData.length) {
    compareFilteredData = type === 'all' ? compareAllData : compareAllData.filter(d => d['種別'] === type);
  } else {
    compareFilteredData = [];
  }

  mergeDates(filteredData, compareFilteredData);

  mainPointsSparse = buildSparseSeries(mergedLabels, filteredData);
  comparePointsSparse = buildSparseSeries(mergedLabels, compareFilteredData);

  initSlider(mergedLabels.length);
  renderChart();
  renderTable(filteredData);

  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-all').classList.add('active');
}

// ===== スライダー =====
function initSlider(total) {
  const s = document.getElementById('slider-start');
  const e = document.getElementById('slider-end');

  s.min = 0; s.max = total - 1; s.value = 0;
  e.min = 0; e.max = total - 1; e.value = total - 1;

  sliderStart = 0;
  sliderEnd = total - 1;

  updateSliderUI();

  s.oninput = () => {
    sliderStart = Math.min(parseInt(s.value), sliderEnd - 1);
    s.value = sliderStart;
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    onSliderChange();
  };

  e.oninput = () => {
    sliderEnd = Math.max(parseInt(e.value), sliderStart + 1);
    e.value = sliderEnd;
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    onSliderChange();
  };
}

function onSliderChange() {
  updateSliderUI();
  renderChart();
}

function updateSliderUI() {
  if (!mergedLabels.length) return;

  const total = mergedLabels.length;

  document.getElementById('label-start').textContent = mergedLabels[sliderStart] || '—';
  document.getElementById('label-end').textContent = mergedLabels[sliderEnd] || '—';

  const pct = v => (v / Math.max(total - 1, 1)) * 100;
  const fill = document.getElementById('slider-fill');
  fill.style.left = pct(sliderStart) + '%';
  fill.style.width = (pct(sliderEnd) - pct(sliderStart)) + '%';

  const count = sliderEnd - sliderStart + 1;
  document.getElementById('nav-count').textContent = count + '大会 表示中';
}

function setPreset(months, btn) {
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  if (!mergedLabels.length) return;

  if (months === 0) {
    sliderStart = 0;
    sliderEnd = mergedLabels.length - 1;
  } else {
    const latest = new Date(mergedLabels[mergedLabels.length - 1]);
    const limit = new Date(latest);
    limit.setMonth(limit.getMonth() - months);

    const limitStr = limit.toISOString().split('T')[0];

    let idx = mergedLabels.findIndex(d => d >= limitStr);
    if (idx === -1) idx = 0;

    sliderStart = idx;
    sliderEnd = mergedLabels.length - 1;
  }

  document.getElementById('slider-start').value = sliderStart;
  document.getElementById('slider-end').value = sliderEnd;

  updateSliderUI();
  renderChart();
}

function shiftRange(dir) {
  if (!mergedLabels.length) return;

  const span = sliderEnd - sliderStart;
  const step = Math.max(1, Math.floor(span * 0.5));

  let ns = sliderStart + dir * step;
  let ne = sliderEnd + dir * step;

  if (ns < 0) { ne -= ns; ns = 0; }
  if (ne > mergedLabels.length - 1) { ns -= (ne - (mergedLabels.length - 1)); ne = mergedLabels.length - 1; }
  ns = Math.max(0, ns);

  sliderStart = ns;
  sliderEnd = ne;

  document.getElementById('slider-start').value = sliderStart;
  document.getElementById('slider-end').value = sliderEnd;

  updateSliderUI();
  renderChart();

  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
}

function renderChart() {
  if (chartInstance) chartInstance.destroy();

  const labels = mergedLabels.slice(sliderStart, sliderEnd + 1);

  const mainPts = mainPointsSparse.filter(p => p.x >= sliderStart && p.x <= sliderEnd)
                                 .map(p => ({ x: p.x - sliderStart, y: p.y }));

  const compPts = comparePointsSparse.filter(p => p.x >= sliderStart && p.x <= sliderEnd)
                                    .map(p => ({ x: p.x - sliderStart, y: p.y }));

  const datasets = [
    {
      label: "メイン (" + mainId + ")",
      data: mainPts,
      borderColor: '#1a56db',
      backgroundColor: 'rgba(26,86,219,0.07)',
      pointBackgroundColor: '#1a56db',
      pointRadius: 4,
      pointHoverRadius: 7,
      fill: true,
      tension: 0.3,
      parsing: false
    }
  ];

  if (compareId) {
    datasets.push({
      label: "比較 (" + compareId + ")",
      data: compPts,
      borderColor: '#e02424',
      backgroundColor: 'rgba(224,36,36,0.05)',
      pointBackgroundColor: '#e02424',
      pointRadius: 4,
      pointHoverRadius: 7,
      fill: false,
      tension: 0.3,
      parsing: false
    });
  }

  chartInstance = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true },
        tooltip: {
          callbacks: {
            title: ctx => labels[ctx[0].parsed.x],
            label: ctx => ' ' + ctx.dataset.label + " : " + ctx.parsed.y.toLocaleString() + ' pt'
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#9ca3af', font: { size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 10 },
          grid: { color: 'rgba(0,0,0,.04)' }
        },
        y: {
          ticks: { color: '#9ca3af', font: { size: 11 } },
          grid: { color: 'rgba(0,0,0,.04)' }
        }
      }
    }
  });
}

function renderTable(data) {
  const reversed = [...data].reverse();

  document.getElementById('table-body').innerHTML = reversed.map((r, i, arr) => {
    const prev = arr[i + 1];
    const dv = prev ? r['レイティング'] - prev['レイティング'] : null;

    const dstr = dv === null ? '' :
      dv > 0 ? `<span style="color:#0e9f6e;font-weight:700;">+${dv}</span>` :
      dv < 0 ? `<span style="color:#e02424;font-weight:700;">${dv}</span>` :
      `<span style="color:#6b7280;">±0</span>`;

    return `<tr>
      <td>${r['日付']}</td>
      <td class="name-col">${r['大会名']}</td>
      <td>${r['レイティング'].toLocaleString()}</td>
      <td>${dstr}</td>
    </tr>`;
  }).join('');
}

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

document.getElementById('compare-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doCompare();
});
</script>
