<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レイティング検索</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #f4f6f9;
  --card: #ffffff;
  --border: #e2e6ed;
  --text: #1a1e2e;
  --text2: #6b7280;
  --accent: #1a56db;
  --up: #0e9f6e;
  --down: #e02424;
  --hdr: #111827;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header { background: var(--hdr); padding: 20px 24px; display: flex; align-items: center; gap: 12px; }
.logo { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.header-text h1 { font-size: 16px; font-weight: 700; color: white; letter-spacing: .04em; }
.header-text p { font-size: 11px; color: #9ca3af; margin-top: 2px; }

.container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

.search-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.search-card h2 { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 16px; }
.search-row { display: flex; gap: 10px; }
.search-row input { flex: 1; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; font-family: 'DM Mono', monospace; color: var(--text); background: white; outline: none; transition: border-color .2s; }
.search-row input:focus { border-color: var(--accent); }
.search-row input::placeholder { color: #c0c8d8; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; }

.type-row { display: flex; gap: 8px; margin-top: 12px; }
.type-btn { padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; color: var(--text2); transition: all .15s; }
.type-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

.btn-search {
  padding: 12px 24px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  white-space: nowrap;
  transition: background .15s, opacity .15s;
}

.btn-search:hover { background: #1648c8; }
.btn-search:active { transform: scale(.98); }

.btn-search:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.loading { text-align: center; padding: 48px; color: var(--text2); font-size: 14px; display: none; }

.pingpong {
  font-size: 48px;
  margin: 0 auto 16px;
  width: fit-content;
  animation: bounce .8s infinite alternate ease-in-out;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-18px); }
}

.result { display: none; }

.profile-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 16px;
}

.profile-info .name { font-size: 18px; font-weight: 700; }
.profile-info .meta { font-size: 13px; color: var(--text2); margin-top: 3px; }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px; text-align: center; }
.stat .lbl { font-size: 11px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
.stat .val { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; }
.val.up { color: var(--up); }
.val.dn { color: var(--down); }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; }
.card-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }

.range-btns { display: flex; gap: 6px; margin-bottom: 14px; }
.range-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: white; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; color: var(--text2); transition: all .15s; }
.range-btn.active { background: var(--hdr); border-color: var(--hdr); color: white; }
.range-btn:hover:not(.active) { background: var(--bg); }

.slider-area { margin-bottom: 14px; }
.slider-labels { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; gap: 8px; }
.slider-labels span { background: #eff4ff; color: var(--accent); padding: 3px 10px; border-radius: 6px; font-weight: 500; font-family: 'DM Mono', monospace; white-space: nowrap; }

.dual-slider-wrap { position: relative; height: 36px; display: flex; align-items: center; }
.slider-track { position: absolute; left: 0; right: 0; height: 4px; background: var(--border); border-radius: 2px; }
.slider-fill { position: absolute; height: 4px; background: var(--accent); border-radius: 2px; }
.dual-slider-wrap input[type=range] { position: absolute; width: 100%; height: 4px; appearance: none; -webkit-appearance: none; background: transparent; pointer-events: none; outline: none; }
.dual-slider-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: white; border: 2.5px solid var(--accent); cursor: pointer; pointer-events: all; box-shadow: 0 1px 4px rgba(0,0,0,.15); }
.dual-slider-wrap input[type=range]::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; background: white; border: 2.5px solid var(--accent); cursor: pointer; pointer-events: all; box-shadow: 0 1px 4px rgba(0,0,0,.15); }

.nav-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.nav-btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: 8px; background: white; font-size: 13px; cursor: pointer; color: var(--text2); font-family: 'Noto Sans JP', sans-serif; transition: all .15s; }
.nav-btn:hover { background: var(--bg); }
.nav-btn:active { transform: scale(.97); }
.nav-center { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }

.chart-wrap { position: relative; width: 100%; height: 240px; margin-top: 16px; }

.filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; color: var(--text2); transition: all .15s; }
.filter-btn.active { background: var(--hdr); border-color: var(--hdr); color: white; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 8px 12px; text-align: left; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); background: #f8fafc; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; font-family: 'DM Mono', monospace; font-size: 13px; }
td.name-col { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; }
tr:last-child td { border-bottom: none; }
.du { color: var(--up); font-weight: 500; }
.dd { color: var(--down); font-weight: 500; }
.dz { color: var(--text2); }

.not-found {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 24px;
  text-align: center;
  color: var(--text2);
  font-size: 14px;
  display: none;
}

.error-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 24px;
  text-align: center;
  color: var(--text2);
  font-size: 14px;
  display: none;
}

.empty { text-align: center; padding: 48px 20px; color: var(--text2); font-size: 14px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.ox { overflow-x: auto; }

@media (max-width: 480px) {
  .stats { gap: 8px; }
  .stat .val { font-size: 18px; }
}
</style>
</head>

<body>

<header>
  <div class="logo">🏓</div>
  <div class="header-text">
    <h1>レイティング検索</h1>
    <p>卓球レイティングポイント推移確認</p>
  </div>
</header>

<div class="container">
  <div class="search-card">
　　<h2>会員番号で検索</h2>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="会員番号を入力（例: 10000001）" inputmode="numeric">
      <button class="btn-search" id="btn-search" onclick="doSearch()">検索</button>
    </div>

    <!-- 最初は非表示で、比較ボタン押すと出てくる -->
    <button class="btn-search" id="btn-show-compare" onclick="showCompare()">比較する</button>

    <div class="search-row" id="compare-row" style="display:none; margin-top:10px;">
      <input type="text" id="compare-input" placeholder="比較用会員番号（任意）" inputmode="numeric">
      <button class="btn-search" onclick="doCompare()">比較する</button>
    </div>

    <div class="type-row">
      <button class="type-btn active" onclick="setType('takkyu', this)">硬式</button>
      <button class="type-btn" onclick="setType('large', this)">ラージ</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="pingpong">🏓</div>
    データを取得中...
  </div>

  <div class="not-found" id="not-found">
    <div class="empty-icon">😔</div>
    該当するデータが見つかりませんでした
  </div>

  <div class="error-box" id="error-box">
    <div class="empty-icon">⚠️</div>
    通信エラーが発生しました<br>
    時間をおいて再度お試しください
  </div>

  <div class="result" id="result">
    <div class="profile-card" id="profile-card">
      <div class="profile-info">
        <div class="name" id="player-id"></div>
        <div class="meta" id="player-meta"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="lbl">現在のポイント</div><div class="val" id="stat-cur">—</div></div>
      <div class="stat"><div class="lbl">最高ポイント</div><div class="val" id="stat-best">—</div></div>
      <div class="stat"><div class="lbl">前回比</div><div class="val" id="stat-diff">—</div></div>
    </div>

    <div class="card">
      <div class="card-title">ポイント推移</div>

      <div class="range-btns">
        <button class="range-btn active" id="btn-all" onclick="setPreset(0, this)">全期間</button>
        <button class="range-btn" onclick="setPreset(12, this)">1年</button>
        <button class="range-btn" onclick="setPreset(6, this)">半年</button>
      </div>

      <div class="slider-area">
        <div class="slider-labels">
          <span id="label-start">—</span>
          <span id="label-end">—</span>
        </div>
        <div class="dual-slider-wrap">
          <div class="slider-track"></div>
          <div class="slider-fill" id="slider-fill"></div>
          <input type="range" id="slider-start" min="0" max="100" value="0">
          <input type="range" id="slider-end" min="0" max="100" value="100">
        </div>
        <div class="nav-btns">
          <button class="nav-btn" onclick="shiftRange(-1)">◀ 前へ</button>
          <div class="nav-center" id="nav-count"></div>
          <button class="nav-btn" onclick="shiftRange(1)">次へ ▶</button>
        </div>
      </div>

      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">大会別一覧</div>
      <div class="filter-row" id="filter-row"></div>
      <div class="ox">
        <table>
          <thead><tr><th>日付</th><th>大会名</th><th>ポイント</th><th>前回比</th></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="empty" id="empty-state">
    <div class="empty-icon">🔍</div>
    会員番号を入力して検索してください
  </div>
</div>

<!-- HTML -->
<div class="search-area">
  <input type="text" id="search-input" placeholder="会員番号を入力">
  <button onclick="doSearch()">検索</button>
</div>

<div class="compare-area">
  <input type="text" id="compare-input" placeholder="比較する会員番号">
  <button onclick="doCompare()">比較する</button>
</div>

<!-- 1人用テーブル -->
<div class="card" id="single-card">
  <div class="card-title">大会一覧</div>
  <div class="ox">
    <table>
      <thead>
        <tr>
          <th>日付</th>
          <th>大会名</th>
          <th>ポイント</th>
        </tr>
      </thead>
      <tbody id="single-table-body"></tbody>
    </table>
  </div>
</div>

<!-- 比較用テーブル -->
<div class="card" id="compare-card" style="display:none;">
  <div class="card-title">比較大会一覧</div>
  <div class="ox">
    <table>
      <thead>
        <tr>
          <th>日付</th>
          <th>大会名</th>
          <th>会員1 ポイント</th>
          <th>会員2 ポイント</th>
          <th>差分</th>
        </tr>
      </thead>
      <tbody id="compare-table-body"></tbody>
    </table>
  </div>
</div>

<style>
  .du { color: green; font-weight: bold; }
  .dd { color: red; font-weight: bold; }
  .name-col { white-space: nowrap; }
</style>

<script>
const API_URL = 'https://example.com/api'; // 実際のデータ取得先に置き換え
let currentType = 'rating'; // 必要に応じて変更

// 1人用検索
async function doSearch() {
  const id = document.getElementById('search-input').value.trim();
  if(!id) return;
  const table = document.getElementById('single-table-body');
  table.innerHTML = '読み込み中...';
  try {
    const res = await fetch(`${API_URL}?id=${encodeURIComponent(id)}&type=${currentType}`).then(r=>r.json());
    if(!Array.isArray(res) || !res.length){
      table.innerHTML = '<tr><td colspan="3">データが見つかりません</td></tr>';
      return;
    }
    table.innerHTML = res.map(d=>`<tr>
      <td>${d['日付']}</td>
      <td class="name-col">${d['大会名']}</td>
      <td>${d['レイティング']}</td>
    </tr>`).join('');
  } catch(e){
    table.innerHTML = '<tr><td colspan="3">通信エラー</td></tr>';
  }
}

// 比較用検索
async function doCompare() {
  const id1 = document.getElementById('search-input').value.trim();
  const id2 = document.getElementById('compare-input').value.trim();
  if(!id1 || !id2) return;

  const table = document.getElementById('compare-table-body');
  table.innerHTML = '読み込み中...';
  document.getElementById('compare-card').style.display='none';

  try{
    const [res1, res2] = await Promise.all([
      fetch(`${API_URL}?id=${encodeURIComponent(id1)}&type=${currentType}`).then(r=>r.json()),
      fetch(`${API_URL}?id=${encodeURIComponent(id2)}&type=${currentType}`).then(r=>r.json())
    ]);

    if(!Array.isArray(res1) || !res1.length || !Array.isArray(res2) || !res2.length){
      table.innerHTML = '<tr><td colspan="5">データが見つかりません</td></tr>';
      document.getElementById('compare-card').style.display='block';
      return;
    }

    const allDates = Array.from(new Set([...res1.map(d=>d['日付']), ...res2.map(d=>d['日付'])])).sort();
    const rows = allDates.map(date=>{
      const d1 = res1.find(d=>d['日付']===date);
      const d2 = res2.find(d=>d['日付']===date);
      const p1 = d1 ? d1['レイティング'] : '-';
      const p2 = d2 ? d2['レイティング'] : '-';
      const diff = (d1 && d2) ? (p1 - p2) : '';
      const diffHtml = diff === '' ? '' : (diff>0 ? `<span class="du">+${diff}</span>` : `<span class="dd">${diff}</span>`);
      const name = d1?.['大会名'] || d2?.['大会名'] || '';
      return `<tr>
        <td>${date}</td>
        <td class="name-col">${name}</td>
        <td>${p1}</td>
        <td>${p2}</td>
        <td>${diffHtml}</td>
      </tr>`;
    });

    table.innerHTML = rows.join('');
    document.getElementById('compare-card').style.display='block';
    document.getElementById('compare-card').scrollIntoView({behavior:'smooth', block:'start'});

  } catch(e){
    table.innerHTML = '<tr><td colspan="5">通信エラー</td></tr>';
    document.getElementById('compare-card').style.display='block';
  }
}
</script>


</body>
</html>
</body>
</html>
